interface:
  display_name: "Guazi Page Delivery"
  short_description: "Turn requirement docs, prototypes, or HTML into Guazi pages and sync to Figma"
  default_prompt: "Use $guazi-page-delivery to recognize whether my input is a requirement doc, prototype, or prototype HTML, route it to the right Guazi page pattern, generate the frontend page, and sync a 375px componentized screen back to Figma."
dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server for capture and componentized page generation"
policy:
  allow_implicit_invocation: true
